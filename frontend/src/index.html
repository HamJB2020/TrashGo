<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrashGo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>TrashGo</h1>
        <nav>
            <ul>
                <li><a href="#registro">Registro</a></li>
                <li><a href="#solicitud">Solicitar Recogida</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="registro">
            <h2>Registro de Usuario</h2>
            <form id="registroForm">
                <label for="username">Nombre de Usuario:</label>
                <input type="text" id="username" name="username" required>
                <label for="dni">DNI:</label>
                <input type="text" id="dni" name="dni" required>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Registrarse</button>
            </form>
        </section>

        <section id="solicitud">
            <h2>Solicitar Recogida</h2>
            <form id="solicitudForm">
                <label for="residueType">Tipo de Residuo:</label>
                <select id="residueType" name="residueType">
                    <option value="normal">Bolsa Normal</option>
                    <option value="reciclaje">Reciclaje</option>
                    <option value="especial">Especial</option>
                </select>
                <label for="pickupTime">Horario de Recogida:</label>
                <input type="datetime-local" id="pickupTime" name="pickupTime" required>
                <label for="address">Dirección:</label>
                <input type="text" id="address" name="address" required>
                <div id="map" style="height: 200px; background-color: #eee; margin-top: 10px;">Mapa aquí</div>
                <p>Costo Aproximado: <span id="approxCost">0.00 €</span></p>
                <button type="submit">Solicitar</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
    <footer>
        <p>&copy; 2026 TrashGo. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
